apiVersion: v1
kind: Namespace
metadata:
  name: apps-demo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-content-pvc
  namespace: apps-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
  storageClassName: managed-csi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-volume-demo
  namespace: apps-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-volume-demo
  template:
    metadata:
      labels:
        app: nginx-volume-demo
    spec:
      initContainers:
        - name: init-content
          image: busybox:1.36
          command: ["sh", "-c", "echo \"Persistent content created on $(date)\" > /data/index.html"]
          volumeMounts:
            - name: web-content
              mountPath: /data
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: web-content
          persistentVolumeClaim:
            claimName: nginx-content-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-volume-demo
  namespace: apps-demo
spec:
  selector:
    app: nginx-volume-demo
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
