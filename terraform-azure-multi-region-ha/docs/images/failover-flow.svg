<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1280"
  height="760"
  viewBox="0 0 1280 760"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Failover and fallback sequence</title>
  <desc id="desc">
    Traffic Manager routes from India to US and then to fallback if both
    regions fail health checks.
  </desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 18; }
      .title { fill: #0f172a; font: 700 32px 'Segoe UI', sans-serif; }
      .head { fill: #0f172a; font: 700 20px 'Segoe UI', sans-serif; }
      .txt { fill: #1e293b; font: 500 15px 'Segoe UI', sans-serif; }
      .note { fill: #334155; font: 500 14px 'Segoe UI', sans-serif; }
      .a1 {
        fill: none;
        stroke: #15803d;
        stroke-width: 3;
        marker-end: url(#a1);
      }
      .a2 {
        fill: none;
        stroke: #1d4ed8;
        stroke-width: 3;
        marker-end: url(#a2);
      }
      .a3 {
        fill: none;
        stroke: #b91c1c;
        stroke-width: 3;
        marker-end: url(#a3);
      }
    </style>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="3">
      <polygon points="0 0,10 3,0 6" fill="#15803d" />
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3">
      <polygon points="0 0,10 3,0 6" fill="#1d4ed8" />
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="3">
      <polygon points="0 0,10 3,0 6" fill="#b91c1c" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" />

  <text class="title" x="640" y="56" text-anchor="middle">
    Traffic Manager Failover and Fallback Flow
  </text>

  <rect class="step" x="40" y="130" width="220" height="200" />
  <text class="head" x="150" y="170" text-anchor="middle">1. Normal</text>
  <text class="txt" x="150" y="204" text-anchor="middle">India healthy</text>
  <text class="txt" x="150" y="230" text-anchor="middle">
    Priority 1 serves
  </text>
  <text class="txt" x="150" y="256" text-anchor="middle">
    US waits as backup
  </text>

  <rect class="step" x="285" y="130" width="220" height="200" />
  <text class="head" x="395" y="170" text-anchor="middle">2. Detect</text>
  <text class="txt" x="395" y="204" text-anchor="middle">
    India probe fails
  </text>
  <text class="txt" x="395" y="230" text-anchor="middle">
    Endpoint unhealthy
  </text>
  <text class="txt" x="395" y="256" text-anchor="middle">
    Priority 1 removed
  </text>

  <rect class="step" x="530" y="130" width="220" height="200" />
  <text class="head" x="640" y="170" text-anchor="middle">3. Failover</text>
  <text class="txt" x="640" y="204" text-anchor="middle">
    US becomes active
  </text>
  <text class="txt" x="640" y="230" text-anchor="middle">Same global DNS</text>
  <text class="txt" x="640" y="256" text-anchor="middle">
    No client changes
  </text>

  <rect class="step" x="775" y="130" width="220" height="200" />
  <text class="head" x="885" y="170" text-anchor="middle">4. Dual Fault</text>
  <text class="txt" x="885" y="204" text-anchor="middle">US also fails</text>
  <text class="txt" x="885" y="230" text-anchor="middle">
    Both regions down
  </text>
  <text class="txt" x="885" y="256" text-anchor="middle">
    Fallback needed
  </text>

  <rect class="step" x="1020" y="130" width="220" height="200" />
  <text class="head" x="1130" y="170" text-anchor="middle">5. Fallback</text>
  <text class="txt" x="1130" y="204" text-anchor="middle">
    Static site serves
  </text>
  <text class="txt" x="1130" y="230" text-anchor="middle">
    Maintenance notice
  </text>
  <text class="txt" x="1130" y="256" text-anchor="middle">
    Service recovers
  </text>

  <path class="a1" d="M260 230 L285 230" />
  <path class="a2" d="M505 230 L530 230" />
  <path class="a2" d="M750 230 L775 230" />
  <path class="a3" d="M995 230 L1020 230" />

  <rect class="step" x="90" y="390" width="350" height="280" />
  <text class="head" x="265" y="432" text-anchor="middle">
    Automatic Behavior
  </text>
  <text class="txt" x="265" y="468" text-anchor="middle">
    Priority routing handles endpoint loss
  </text>
  <text class="txt" x="265" y="494" text-anchor="middle">
    without changing client URL.
  </text>
  <text class="note" x="265" y="524" text-anchor="middle">
    Probe interval and tolerance are configurable.
  </text>

  <rect class="step" x="465" y="390" width="350" height="280" />
  <text class="head" x="640" y="432" text-anchor="middle">
    Manual DR Control
  </text>
  <text class="txt" x="640" y="468" text-anchor="middle">
    Set force_failover_to_secondary = true
  </text>
  <text class="txt" x="640" y="494" text-anchor="middle">
    to promote US to priority 1.
  </text>
  <text class="note" x="640" y="524" text-anchor="middle">
    Set false to fail back after India recovers.
  </text>

  <rect class="step" x="840" y="390" width="350" height="280" />
  <text class="head" x="1015" y="432" text-anchor="middle">DR Artifacts</text>
  <text class="txt" x="1015" y="468" text-anchor="middle">
    RA-GRS storage keeps recovery assets
  </text>
  <text class="txt" x="1015" y="494" text-anchor="middle">
    in the private dr-backups container.
  </text>
  <text class="note" x="1015" y="524" text-anchor="middle">
    Lifecycle retention controls storage growth.
  </text>
</svg>
