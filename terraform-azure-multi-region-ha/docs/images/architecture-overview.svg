<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1280"
  height="860"
  viewBox="0 0 1280 860"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Azure multi-region architecture</title>
  <desc id="desc">
    Primary Central India and secondary East US 2 behind Traffic Manager,
    with fallback website and DR storage.
  </desc>

  <defs>
    <style>
      .bg { fill: #f5f8ff; }
      .card { fill: #ffffff; stroke: #2f4f6f; stroke-width: 2; rx: 18; }
      .title { fill: #0f172a; font: 700 34px 'Segoe UI', sans-serif; }
      .head { fill: #0f172a; font: 700 22px 'Segoe UI', sans-serif; }
      .txt { fill: #1e293b; font: 500 16px 'Segoe UI', sans-serif; }
      .small { fill: #334155; font: 500 14px 'Segoe UI', sans-serif; }
      .arrow {
        fill: none;
        stroke: #1d4ed8;
        stroke-width: 3;
        marker-end: url(#arrow-head);
      }
      .arrow-dr {
        fill: none;
        stroke: #b45309;
        stroke-width: 3;
        stroke-dasharray: 9 6;
        marker-end: url(#arrow-dr-head);
      }
    </style>
    <marker
      id="arrow-head"
      markerWidth="10"
      markerHeight="10"
      refX="8"
      refY="3"
      orient="auto"
    >
      <polygon points="0 0,10 3,0 6" fill="#1d4ed8" />
    </marker>
    <marker
      id="arrow-dr-head"
      markerWidth="10"
      markerHeight="10"
      refX="8"
      refY="3"
      orient="auto"
    >
      <polygon points="0 0,10 3,0 6" fill="#b45309" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="860" />

  <text class="title" x="640" y="58" text-anchor="middle">
    Azure Multi-Region HA, DR, and Fallback
  </text>

  <rect class="card" x="470" y="90" width="340" height="90" />
  <text class="head" x="640" y="128" text-anchor="middle">Clients</text>
  <text class="small" x="640" y="154" text-anchor="middle">
    Global users enter through one DNS endpoint
  </text>

  <rect class="card" x="390" y="220" width="500" height="130" />
  <text class="head" x="640" y="264" text-anchor="middle">
    Azure Traffic Manager (Priority)
  </text>
  <text class="txt" x="640" y="292" text-anchor="middle">
    Priority 1: India, Priority 2: US, Priority 3: Fallback
  </text>
  <text class="small" x="640" y="318" text-anchor="middle">
    Probe: HTTP on port 80
  </text>

  <rect class="card" x="70" y="410" width="360" height="290" />
  <text class="head" x="250" y="450" text-anchor="middle">
    Primary Region: Central India
  </text>
  <text class="txt" x="250" y="486" text-anchor="middle">
    Resource Group, VNet, Subnet, NSG
  </text>
  <text class="txt" x="250" y="516" text-anchor="middle">
    Public LB and VM Scale Set
  </text>
  <text class="txt" x="250" y="546" text-anchor="middle">
    AKS cluster with autoscaler
  </text>
  <text class="small" x="250" y="580" text-anchor="middle">
    Robust baseline with cost-aware sizing
  </text>

  <rect class="card" x="460" y="410" width="360" height="290" />
  <text class="head" x="640" y="450" text-anchor="middle">
    Secondary Region: East US 2
  </text>
  <text class="txt" x="640" y="486" text-anchor="middle">
    Resource Group, VNet, Subnet, NSG
  </text>
  <text class="txt" x="640" y="516" text-anchor="middle">
    Public LB and VM Scale Set
  </text>
  <text class="txt" x="640" y="546" text-anchor="middle">
    AKS cluster with autoscaler
  </text>
  <text class="small" x="640" y="580" text-anchor="middle">
    Failover target with right-sized baseline
  </text>

  <rect class="card" x="850" y="410" width="360" height="130" />
  <text class="head" x="1030" y="452" text-anchor="middle">
    Fallback Endpoint
  </text>
  <text class="txt" x="1030" y="486" text-anchor="middle">
    Static maintenance website
  </text>
  <text class="small" x="1030" y="514" text-anchor="middle">
    Served only when both regions are unhealthy
  </text>

  <rect class="card" x="850" y="570" width="360" height="130" />
  <text class="head" x="1030" y="612" text-anchor="middle">
    DR Storage (RA-GRS)
  </text>
  <text class="txt" x="1030" y="644" text-anchor="middle">
    Private dr-backups container + retention
  </text>
  <text class="small" x="1030" y="670" text-anchor="middle">
    Stores artifacts used by DR runbooks
  </text>

  <path class="arrow" d="M640 180 L640 220" />
  <path class="arrow" d="M520 350 L250 410" />
  <path class="arrow" d="M640 350 L640 410" />
  <path class="arrow" d="M760 350 L1030 410" />
  <path class="arrow-dr" d="M1030 570 L1030 540" />
</svg>
